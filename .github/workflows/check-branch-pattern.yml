name: Check Branch Pattern

on:
  pull_request:
    branches:
      - main

jobs:
  check-branch:
    name: Block Release Branches
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          if [[ "${{ github.head_ref }}" == release/* ]]; then
            echo "::error::Release branches (release/*) cannot be merged directly into main. Use a non-release branch."
            exit 1
          fi
          echo "Branch '${{ github.head_ref }}' is allowed."
